<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>POF Design System · Assets</title>
<link rel="stylesheet" href="styles.css">
<style>
.cat-block{margin:0 0 56px}
.cat-head{
  display:flex;align-items:baseline;gap:14px;
  font-family:'Poppins',sans-serif;
  margin:0 0 18px;padding-bottom:10px;
  border-bottom:1px solid var(--neutral-mid);
}
.cat-head h2{
  font-weight:600;font-size:13px;letter-spacing:2px;
  color:var(--steel);text-transform:uppercase;margin:0;
}
.cat-head .count{
  font-family:'Roboto Mono',monospace;font-size:11px;
  color:var(--gray-600);
}
.cat-head .pathlbl{
  margin-left:auto;
  font-family:'Roboto Mono',monospace;font-size:11px;
  color:var(--gray-600);
}
.asset-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:14px;
}
.asset-tile{
  display:flex;flex-direction:column;
  background:var(--white);
  border:1px solid var(--neutral-mid);border-radius:6px;
  padding:0;text-decoration:none;color:var(--navy);
  transition:border-color .15s,box-shadow .15s;
  overflow:hidden;
}
.asset-tile:hover{border-color:var(--teal);box-shadow:0 4px 12px rgba(28,31,59,.06)}
.asset-tile .preview{
  aspect-ratio:1.6/1;background:var(--gris-pof);
  display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden;
  border-bottom:1px solid var(--neutral-mid);
}
.asset-tile .preview.dark{background:var(--navy)}
.asset-tile .preview img{max-width:100%;max-height:100%;object-fit:contain}
.asset-tile .nm{
  padding:10px 14px;
  font-family:'Roboto Mono',monospace;font-size:11px;
  color:var(--navy);word-break:break-all;line-height:1.35;
}
.cat-link{
  font-family:'Poppins',sans-serif;font-size:11px;
  color:var(--teal-dark);text-decoration:none;
  border:1px solid var(--neutral-mid);
  padding:6px 12px;border-radius:5px;
}
.cat-link:hover{border-color:var(--teal)}
</style>
</head>
<body class="ds-page" data-breadcrumb="Design System · Assets">

<header class="hero">
  <div class="pipe-row">
    <div class="pipe"></div>
    <div>
      <div class="eyebrow">POF · Assets</div>
      <h1>Assets bruts</h1>
      <p>Logos, brand-elements, backgrounds, monogramme. Listés par catégorie, depuis <code>assets/</code>. Icons et maps ont leur galerie dédiée.</p>
    </div>
  </div>
</header>

<section class="section" id="sections-host"></section>

<script src="_app.js"></script>
<script>
// Each entry maps a folder path to its display label and preview style.
// Order here = display order on the page.
const SECTIONS = [
  { path: 'assets/logos',          title: 'Logos',           dark: false, hint: 'Variantes navy / monochrome / teal-on-white / white.' },
  { path: 'assets/monogramme',     title: 'Monogramme',      dark: false, hint: 'Picto P sans texte (color, white).' },
  { path: 'assets/brand-elements', title: 'Brand elements',  dark: false, hint: 'Corner brackets, waves.' },
  { path: 'assets/backgrounds',    title: 'Backgrounds',     dark: false, hint: 'Backgrounds vectoriels (waves).' },
];
// assets/icons and assets/maps live under their own top-nav entries (Icons, Maps).

(async function () {
  const host = document.getElementById('sections-host');
  POF.renderLoading(host);
  const { tree } = await POF.loadTree();
  if (!tree.length) { POF.renderError(host, 'Tree fetch a échoué — recharge la page.'); return; }

  let html = '';

  for (const section of SECTIONS) {
    const items = POF.listRecursive(tree, section.path).filter(e => e.path.endsWith('.svg'));
    if (!items.length) continue;
    html += `<div class="cat-block">
      <div class="cat-head">
        <h2>${POF.escapeHtml(section.title)}</h2>
        <span class="count">${items.length} fichier${items.length>1?'s':''}</span>
        <span class="pathlbl">${POF.escapeHtml(section.path)}/</span>
      </div>
      <div class="asset-grid">
        ${items.map(e => {
          const fn = e.path.split('/').pop();
          const previewClass = (fn.includes('white') && !fn.includes('teal-white')) ? 'preview dark' : 'preview';
          return `<a class="asset-tile" href="${POF.escapeHtml(POF.BLOB(e.path))}" target="_blank" rel="noopener" title="${POF.escapeHtml(e.path)}">
            <div class="${previewClass}"><img src="${POF.escapeHtml(POF.RAW(e.path))}" alt="${POF.escapeHtml(fn)}" loading="lazy" onerror="this.style.opacity=.2"></div>
            <div class="nm">${POF.escapeHtml(fn)}</div>
          </a>`;
        }).join('')}
      </div>
    </div>`;
  }

  // Note: assets/icons and assets/maps have their own top-nav entries (Icons, Maps).
  // We don't duplicate them here as cards — the topbar covers it.

  host.outerHTML = `<section class="section">${html}</section>`;
})();
</script>

</body>
</html>
