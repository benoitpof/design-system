<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>POF Design System · Tokens</title>
<link rel="stylesheet" href="styles.css">
<style>
.swatch{display:flex;align-items:center;gap:14px;padding:10px 14px;border-bottom:1px solid var(--neutral-mid)}
.swatch:last-child{border-bottom:none}
.swatch .chip{width:36px;height:36px;border-radius:6px;border:1px solid var(--neutral-mid)}
.swatch .nm{font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:var(--navy)}
.swatch .hex{font-family:'Roboto Mono',monospace;font-size:12px;color:var(--gray-600)}
.swatch .desc{font-family:'Raleway',sans-serif;font-size:12px;color:var(--gray-600);margin-left:auto;text-align:right}
.swatch-host{background:var(--white);border:1px solid var(--neutral-mid);border-radius:8px;overflow:hidden}
</style>
</head>
<body class="ds-page" data-breadcrumb="Design System · Tokens">

<header class="hero">
  <div class="pipe-row">
    <div class="pipe"></div>
    <div>
      <div class="eyebrow">POF · Tokens</div>
      <h1>Tokens & rules</h1>
      <p>SSOT colors, typography, spacing, components, entity overrides. Liste live de <code>tokens/</code>.</p>
    </div>
  </div>
</header>

<section class="section">
  <h2>Fichiers</h2>
  <div class="grid-3" id="grid"></div>
</section>

<section class="section">
  <h2>Couleurs (depuis brand-tokens.json)</h2>
  <p class="lead">Aperçu live des couleurs primaires, fetched directement depuis le repo.</p>
  <div class="swatch-host" id="swatches">Chargement…</div>
</section>

<script src="_app.js"></script>
<script>
const HINTS = {
  'brand-tokens.json':           'SSOT JSON : colors, typography, spacing, components, entity overrides.',
  'brand-tokens.css':            'CSS custom properties exportées depuis le JSON.',
  'brand-rules-per-format.json': 'Rules par format : slides, docs, web, excel, linkedin, charts, maps.',
};

(async function () {
  const grid = document.getElementById('grid');
  POF.renderLoading(grid);
  const { tree } = await POF.loadTree();
  if (!tree.length) { POF.renderError(grid, 'Tree fetch a échoué.'); return; }

  const items = POF.listDir(tree, 'tokens').filter(e => e.type === 'blob');
  if (!items.length) { POF.renderEmpty(grid, 'tokens/ vide.'); return; }

  grid.innerHTML = items.map(e => {
    const fn = e.path.split('/').pop();
    const isMd = fn.endsWith('.md');
    const isCss = fn.endsWith('.css');
    const isJson = fn.endsWith('.json');
    const href = isMd ? ('docs.html?path=' + encodeURIComponent(e.path)) : POF.BLOB(e.path);
    const tgt = isMd ? '' : ' target="_blank" rel="noopener"';
    return `<a class="card" href="${POF.escapeHtml(href)}"${tgt}>
      <div class="meta">
        <span class="num">${isJson ? 'JSON' : isCss ? 'CSS' : isMd ? 'Doc' : 'File'}</span>
        <span class="name">${POF.escapeHtml(fn)}</span>
        <span class="desc">${POF.escapeHtml(HINTS[fn] || ('Token : ' + fn))}</span>
        <span class="badge dim">${POF.escapeHtml(e.path)}</span>
      </div>
    </a>`;
  }).join('');

  // Swatches from brand-tokens.json
  const sw = document.getElementById('swatches');
  try {
    const txt = await POF.fetchRaw('tokens/brand-tokens.json');
    const json = JSON.parse(txt);
    const colors = json.colors || (json.brand_tokens && json.brand_tokens.colors) || null;
    if (!colors) { sw.textContent = 'Aucune section "colors" trouvée dans brand-tokens.json.'; return; }
    // Flatten one level
    const rows = [];
    const walk = (obj, prefix = '') => {
      for (const [k, v] of Object.entries(obj)) {
        if (k.startsWith('_')) continue; // skip metadata keys
        if (typeof v === 'string' && /^#[0-9a-f]{3,8}$/i.test(v)) {
          rows.push({ name: prefix + k, hex: v });
        } else if (typeof v === 'object' && v !== null) {
          // Token may carry hex directly: { hex: '#...', rgb: [...], usage: '...' }
          if (typeof v.hex === 'string' && /^#/.test(v.hex)) {
            rows.push({ name: prefix + k, hex: v.hex, desc: v.usage || v.note || '' });
          } else if (typeof v.value === 'string' && /^#/.test(v.value)) {
            rows.push({ name: prefix + k, hex: v.value, desc: v.usage || v.note || '' });
          } else {
            walk(v, prefix + k + '.');
          }
        }
      }
    };
    walk(colors);
    if (!rows.length) { sw.textContent = 'Aucune couleur extraite (structure JSON inattendue).'; return; }
    sw.innerHTML = rows.slice(0, 50).map(r => `
      <div class="swatch">
        <span class="chip" style="background:${POF.escapeHtml(r.hex)}"></span>
        <span class="nm">${POF.escapeHtml(r.name)}</span>
        <span class="hex">${POF.escapeHtml(r.hex)}</span>
        <span class="desc">${POF.escapeHtml(r.desc || '')}</span>
      </div>`).join('');
    if (rows.length > 50) {
      sw.insertAdjacentHTML('beforeend', `<div class="swatch"><span class="desc">+${rows.length - 50} autres tokens — voir <a href="${POF.BLOB('tokens/brand-tokens.json')}" target="_blank" rel="noopener">le JSON complet</a>.</span></div>`);
    }
  } catch (e) {
    sw.innerHTML = `<div class="swatch"><span class="desc" style="color:var(--coral)">⚠ ${POF.escapeHtml(e.message)}</span></div>`;
  }
})();
</script>

</body>
</html>
