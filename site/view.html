<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>POF Design System · HTML Viewer</title>
<link rel="stylesheet" href="styles.css">
<style>
.viewer-head{max-width:1280px;margin:24px auto 16px;padding:0 32px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.viewer-head .crumbs{font-family:'Roboto Mono',monospace;font-size:12px;color:var(--gray-600);flex-grow:1}
.viewer-head .crumbs a{color:var(--teal-dark);text-decoration:none}
.viewer-host{max-width:1280px;margin:0 auto 32px;padding:0 32px}
.viewer-host iframe{width:100%;height:calc(100vh - 200px);min-height:780px;border:1px solid var(--neutral-mid);border-radius:8px;background:var(--white);display:block}
</style>
</head>
<body class="ds-page" data-breadcrumb="Design System · HTML Viewer">

<div class="viewer-head">
  <div class="crumbs" id="crumbs">…</div>
  <div class="actions" id="actions"></div>
</div>

<div class="viewer-host">
  <iframe id="frame" sandbox="allow-scripts allow-same-origin" loading="lazy"></iframe>
</div>

<script src="_app.js"></script>
<script>
function getPath() {
  return new URLSearchParams(location.search).get('path') || 'examples/charts/01-kpi.html';
}

// Pre-existing broken refs in chart pages (path → fixed URL)
// The chart files reference ../styles.css which doesn't exist at examples/styles.css.
// They actually need the chart-bank styles which sit at examples/charts/styles.css.
// Same for the logo: pof-logo-color.svg doesn't exist; use pof-logo-navy.svg.
function rewriteChartPagePaths(html, sourceDir) {
  const repoStylesUrl = `https://cdn.jsdelivr.net/gh/${POF.REPO}@${POF.BRANCH}/examples/charts/styles.css`;
  const logoUrl = POF.RAW('assets/logos/pof-logo-navy.svg');
  const indexUrl = location.origin + location.pathname.replace(/[^/]*$/, '') + 'index.html';

  return html
    .replace(/href="\.\.\/styles\.css(\?[^"]*)?"/g, `href="${repoStylesUrl}"`)
    .replace(/src="\.\.\/assets\/pof-logo-color\.svg"/g, `src="${logoUrl}"`)
    .replace(/href="\.\.\/index\.html"/g, `href="${indexUrl}"`);
}

// Generic URL rewriter for everything else (relative paths in srcdoc)
function rewriteGenericPaths(html, sourceDir) {
  return html.replace(/(href|src)="([^"]+)"/g, (m, attr, url) => {
    if (/^(https?:|data:|#|mailto:)/.test(url)) return m;
    if (url.startsWith('//')) return m;
    const resolved = POF.resolvePath(sourceDir, url);
    let target;
    if (/\.(svg|png|jpe?g|gif|webp|ico)$/i.test(resolved)) {
      target = POF.RAW(resolved);
    } else if (/\.(html|htm)$/i.test(resolved)) {
      // Other HTML referenced from inside this HTML — let's open in our viewer
      target = location.origin + location.pathname.replace(/[^/]*$/, '') + 'view.html?path=' + encodeURIComponent(resolved);
    } else {
      // CSS / JS / JSON / md → jsdelivr serves with proper content-type
      target = `https://cdn.jsdelivr.net/gh/${POF.REPO}@${POF.BRANCH}/${resolved}`;
    }
    return `${attr}="${target}"`;
  });
}

(async function () {
  const path = getPath();
  const sourceDir = path.split('/').slice(0, -1).join('/');
  const fileName = path.split('/').pop();

  // Crumbs
  const segs = path.split('/');
  const crumbHtml = ['<a href="tree.html">root</a>'];
  let cur = '';
  for (let i = 0; i < segs.length - 1; i++) {
    cur = cur ? cur + '/' + segs[i] : segs[i];
    crumbHtml.push(' / <a href="tree.html?path=' + encodeURIComponent(cur) + '">' + POF.escapeHtml(segs[i]) + '</a>');
  }
  crumbHtml.push(' / <span>' + POF.escapeHtml(segs[segs.length - 1]) + '</span>');
  document.getElementById('crumbs').innerHTML = crumbHtml.join('');

  document.getElementById('actions').innerHTML = `
    <a class="btn primary" href="${POF.BLOB(path)}" target="_blank" rel="noopener">View on GitHub ↗</a>
    <a class="btn" href="https://cdn.jsdelivr.net/gh/${POF.REPO}@${POF.BRANCH}/${path}" target="_blank" rel="noopener">jsdelivr URL</a>
    <a class="btn" href="tree.html?path=${encodeURIComponent(sourceDir)}">Up to folder</a>
  `;

  const { tree } = await POF.loadTree();
  if (tree.length && !POF.findExact(tree, path)) {
    document.querySelector('.viewer-host').innerHTML = `<div class="error-state">Le fichier <code>${POF.escapeHtml(path)}</code> n'existe pas dans le repo. <a href="tree.html">Vue arbre</a>.</div>`;
    return;
  }

  try {
    let html = await POF.fetchRaw(path);

    // Step 1: explicitly fix the broken references in chart/map pages
    if (sourceDir === 'examples/charts' || sourceDir === 'examples/maps' || sourceDir.startsWith('examples/')) {
      html = rewriteChartPagePaths(html, sourceDir);
    }

    // Step 2: rewrite all remaining relative URLs to absolute jsdelivr/raw equivalents
    html = rewriteGenericPaths(html, sourceDir);

    // Step 3: ensure font and viewport are sane (most chart pages don't include viewport meta)
    if (!/<meta\s+name=["']viewport["']/i.test(html)) {
      html = html.replace(/<head>/i, '<head>\n<meta name="viewport" content="width=device-width, initial-scale=1">');
    }

    document.getElementById('frame').srcdoc = html;
  } catch (e) {
    document.querySelector('.viewer-host').innerHTML = `<div class="error-state">⚠ ${POF.escapeHtml(e.message)}</div>`;
  }
})();
</script>

</body>
</html>
