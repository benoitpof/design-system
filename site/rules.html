<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>POF Design System · Rules</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="ds-page" data-breadcrumb="Design System · Rules">

<header class="hero">
  <div class="pipe-row">
    <div class="pipe"></div>
    <div>
      <div class="eyebrow">POF · Rules</div>
      <h1>Règles transverses</h1>
      <p>Tout ce qui est non négociable et applicable cross-medium. Liste live de <code>rules/</code>.</p>
    </div>
  </div>
</header>

<section class="section">
  <h2>Documents</h2>
  <p class="lead">Cliquer ouvre la version markdown rendue ; chaque doc est aussi accessible directement sur GitHub.</p>
  <div class="grid-3" id="grid"></div>
</section>

<script src="_app.js"></script>
<script>
const HINTS = {
  'HARD-LOCKS.md':    'Brand DNA : type-scale, weight, gradient, corner marks. Non négociable.',
  'CONTENT-RULES.md': 'Narrative rules par layout : ce qui va où, max words, tone, sources.',
  'CHARTS.md':        '16 chart templates catalogués.',
  'MAPS.md':          '5 patterns canoniques de cartographie.',
  'ICONS.md':         'Tabler CDN + brand pictos POF.',
  'PHOTOS.md':        'Sources, recadrage, overlay system.',
  'TABLES.md':        'Règles tableaux par medium.',
  'ASSETS.md':        'Index complet : logos, pictos, brand-elements, backgrounds, icons.',
  'README.md':        'Index des règles.',
};

(async function () {
  const grid = document.getElementById('grid');
  POF.renderLoading(grid);
  const { tree } = await POF.loadTree();
  if (!tree.length) { POF.renderError(grid, 'Tree fetch a échoué.'); return; }

  const items = POF.listDir(tree, 'rules').filter(e => e.type === 'blob' && e.path.endsWith('.md'));
  if (!items.length) { POF.renderEmpty(grid, 'Aucun fichier dans rules/.'); return; }

  grid.innerHTML = items.map(e => {
    const fn = e.path.split('/').pop();
    return `<a class="card" href="docs.html?path=${encodeURIComponent(e.path)}">
      <div class="meta">
        <span class="num">Rules</span>
        <span class="name">${POF.escapeHtml(fn.replace(/\.md$/, ''))}</span>
        <span class="desc">${POF.escapeHtml(HINTS[fn] || ('Règle : ' + fn))}</span>
        <span class="badge dim">${POF.escapeHtml(e.path)}</span>
      </div>
    </a>`;
  }).join('');
})();
</script>

</body>
</html>
