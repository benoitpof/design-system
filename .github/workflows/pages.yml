name: Deploy GitHub Pages

# Pages live in /site/ and read all repo content dynamically at runtime via the
# GitHub API + raw.githubusercontent + jsdelivr. No Python build step needed —
# any change in rules/, layouts/, examples/, etc. is picked up on the next
# visit to the site, no redeploy required.
#
# This workflow only redeploys the site/ shell when /site/* itself changes
# (or when manually dispatched).

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site/ as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
